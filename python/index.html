<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>심플 메모장</title>
    <style>
        /* 기본 스타일 리셋 및 폰트 설정 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f5f6fa;
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 20px;
        }

        /* 메인 컨테이너 */
        .container {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }

        /* 텍스트 입력 영역 */
        textarea {
            flex-grow: 1;
            border: none;
            resize: none;
            padding: 20px;
            font-size: 16px;
            line-height: 1.6;
            color: #2f3640;
            outline: none;
            background-color: #fdfdfd;
        }

        /* 하단 바 (버튼 및 상태 표시) */
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background-color: #f1f2f6;
            border-top: 1px solid #e4e7eb;
        }

        /* 상태 메시지 스타일 */
        .status-message {
            font-size: 13px;
            color: #718093;
            transition: color 0.3s ease;
        }

        .status-message.success {
            color: #4cd137;
            font-weight: bold;
        }

        /* 저장 버튼 스타일 */
        .btn-save {
            background-color: #00a8ff;
            color: white;
            border: none;
            padding: 10px 24px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.1s ease;
        }

        .btn-save:hover {
            background-color: #0097e6;
        }

        .btn-save:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="container">
        <textarea id="memo-area" placeholder="여기에 메모를 작성하세요..."></textarea>
        
        <div class="footer">
            <span id="status" class="status-message">프로그램 준비 완료</span>
            <button class="btn-save" onclick="saveMemo()">메모 저장</button>
        </div>
    </div>

    <script>
        const memoArea = document.getElementById('memo-area');
        const statusElement = document.getElementById('status');

        // 1. pywebview가 준비되면 자동으로 기존 메모를 불러옵니다.
        window.addEventListener('pywebviewready', async () => {
            showStatus("메모를 불러오는 중...");
            try {
                // Python의 load_note() 함수 호출
                const response = await window.pywebview.api.load_note();
                if (response && response.text) {
                    memoArea.value = response.text;
                }
                showStatus("메모를 성공적으로 불러왔습니다.");
            } catch (error) {
                showStatus("메모를 불러오는데 실패했습니다.", true);
                console.error(error);
            }
        });

        // 2. 메모를 저장하는 함수
        async function saveMemo() {
            const textContent = memoArea.value;
            showStatus("저장 중...");

            try {
                // Python의 save_note(text) 함수 호출
                const response = await window.pywebview.api.save_note(textContent);
                if (response && response.status === "saved") {
                    showStatus("성공적으로 저장되었습니다!", false, true);
                }
            } catch (error) {
                showStatus("저장 중 오류가 발생했습니다.", true);
                console.error(error);
            }
        }

        // 상태 메시지 표시 함수
        function showStatus(message, isError = false, isSuccess = false) {
            statusElement.innerText = message;
            statusElement.className = "status-message"; // 클래스 초기화
            
            if (isError) {
                statusElement.style.color = "#e84118";
            } else if (isSuccess) {
                statusElement.classList.add("success");
                // 3초 후 원래 메시지로 변경
                setTimeout(() => {
                    statusElement.classList.remove("success");
                    statusElement.innerText = "안전하게 저장됨";
                }, 3000);
            } else {
                statusElement.style.color = "#718093";
            }
        }
    </script>
</body>
</html>
